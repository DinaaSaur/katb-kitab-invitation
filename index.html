<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Wedding invitation for Rana and Abdelrahman">
    <meta property="og:title" content="Rana & Abdelrahman - Katb Kitab">
    <meta property="og:description" content="You are invited to Rana and Abdelrahman's Katb Kitab.">
    <meta property="og:image" content="assets/KatbKitab.jpeg">
    <title>Rana & Abdelrahman - Katb Kitab</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="invitation-page">
      <article class="invitation-card" aria-label="Wedding invitation for Rana and Abdelrahman">
        <div class="flower flower-top" aria-hidden="true"></div>
        <div class="flower flower-bottom" aria-hidden="true"></div>

        <section class="invitation-content">
          <p class="bismillah" lang="ar" dir="rtl">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</p>

          <p class="family-line">Together with their families</p>

          <h1 class="couple-names">
            <span>Rana</span>
            <span class="ampersand">&amp;</span>
            <span>Abdelrahman</span>
          </h1>

          <p class="invite-line">invite you to their</p>
          <p class="event-title">Katb Kitab</p>

          <div class="event-details" aria-label="Event details">
            <div class="detail-block">
              <span class="detail-rule"></span>
              <span class="detail-main">Tuesday</span>
              <span class="detail-rule"></span>
            </div>

            <div class="date-block">
              <span class="month">July</span>
              <span class="day">21</span>
            </div>

            <div class="detail-block">
              <span class="detail-rule"></span>
              <span class="detail-main">8:00 PM</span>
              <span class="detail-rule"></span>
            </div>
          </div>

          <address class="location">
            Islamic Center B<br>
            Sheikh Zayed
          </address>
        </section>
      </article>
    </main>
  </body>
</html>
